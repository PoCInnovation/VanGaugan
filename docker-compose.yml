version: "3"

services:
    front:
        container_name: vg-front
        build: ./front
        volumes:
            - html:/app/build

    api:
        depends_on:
            - front
        container_name: vg-api
        build: .
        volumes:
            - html:/html/
        networks:
            - vg-networks

    reverse-proxy:
        depends_on:
            - api
        container_name: vg-nginx
        image: nginx:mainline-alpine
        volumes:
            - html:/var/www/html
            - ./nginx/:/etc/nginx/conf.d
        ports:
            - "80:80"
        networks:
            - vg-networks

networks:
    vg-network:
      driver: bridge

volumes:
    html: